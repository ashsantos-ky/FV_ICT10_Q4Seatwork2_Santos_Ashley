<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>My Classmates</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .class{
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
            box-sizing:border-box;
        }
        h1, h5{
            text-align:center;
            margin-top:20px;
            color:var(--accent-600);
            font-size:28px;
            font-weight:700;
        }
        :root{
            --bg: rgba(255,240,230,0.8);              
            --card: rgba(255,240,230,0.85);
            --accent: #b22222;         
            --accent-600: #800000;     
            --muted: #4a1a1a;
            --soft-border: rgba(88,64,45,0.14);
            --shadow: 0 18px 40px rgba(30,35,40,0.09);
            --success: #2f8f5a;
            --input-bg: #fffaf6;
        }
         html,body{height:100%;margin:0}
          body{font-family:Inter,system-ui,Arial;background:url('3.png') no-repeat center center fixed;background-size:cover;line-height:1.5;color:var(--muted);}
          .btn{background:var(--accent-600);color:#fff;border:0;padding:12px 18px;border-radius:10px;font-weight:700;transition:all .2s;display:inline-block}
            .btn:hover{background:#8f6a1f;color:#fff;transform:translateY(-2px);box-shadow:0 8px 20px rgba(173,128,48,0.15)}
          
         body {
            padding-top: 70px; 
        }
        .container-center {
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
            padding:0 20px;
            box-sizing:border-box;
        }
        .box {
            align-self:center;
            border-radius:16px;
            padding:36px 40px;
            background: var(--card);
            box-shadow:0 20px 50px rgba(30,35,40,0.08), 0 0 0 1px var(--soft-border);
            max-width:420px;
            width:100%;
            text-align:center;
        }
        #classmatefav{
            white-space:pre-wrap;
            margin-top:8px;
            color:var(--muted);
            text-align:center;
        }
        #classmatefav .list-wrap{
            background:var(--card);
            padding:6px;
            border-radius:8px;
            border:1px solid rgba(172,136,80,0.06);
            display:inline-block;
            max-width:360px;
            width:auto;
        }
        #classmatefav .classmate-item{
            padding:4px 6px;
            border-radius:4px;
            margin-bottom:4px;
            background:transparent;
            color:var(--muted);
            text-align:center;
            font-size:14px;
            line-height:1.4;
        }
        input {
    width: 100%;
    padding: 12px 14px;
    margin: 12px 0;
    border: 1.5px solid var(--soft-border);
    border-radius: 8px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    color: var(--muted);
    background-color: #fafafa;
    box-sizing: border-box;
    transition: all 0.2s ease;
}
    </style>
  </head>
  <body>
    <h1>Grade 10 Classmates System</h1>
    <h5>Add yourself to the class get to know each other list.</h5>
    <div class="class">
      <div class="box">
                     <input type="text" id="classmateInput" placeholder="Enter Name">
                    <input type="text" id="classmateInput1" placeholder="Enter Section">
                    <input type="text" id="classmateInput2" placeholder="Enter Favorite Subject">
                     <button type="button" class="btn" style="width:100%;margin-top:8px;" py-click="add_classmate">Add Classmate</button>
                    <button type="button" class="btn" style="width:100%;margin-top:8px;" py-click="add_you">Show List</button>
                    <div id="classmatefav"></div>
                  </div>
                </div>
                <script type="py" src="main.py"></script>
              </body>
            </html>`
